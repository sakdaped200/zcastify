<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="zcastify.com — something exciting is coming soon.">
    <title>zcastify.com | Coming Soon</title>
    <style>
        :root {
            color-scheme: dark;
        }
        * {
            box-sizing: border-box;
        }
        html, body {
            margin: 0;
            padding: 0;
            height: 100%;
            overflow: hidden;
            background: radial-gradient(ellipse at 50% 30%, #16213e 0%, #0f172a 55%, #070c1a 100%);
            color: #f8fafc;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }
        #scene {
            position: fixed;
            inset: 0;
            width: 100%;
            height: 100%;
            display: block;
            filter: drop-shadow(0 0 14px rgba(56, 189, 248, 0.35));
            opacity: 0;
            transition: opacity 1.6s ease;
        }
        #scene.ready {
            opacity: 1;
        }
        .container {
            position: fixed;
            left: 50%;
            bottom: 9vh;
            transform: translateX(-50%);
            max-width: 640px;
            width: 90%;
            padding: 0 20px;
            text-align: center;
            z-index: 2;
            opacity: 0;
            transition: opacity 1.4s ease 0.5s, transform 1.4s ease 0.5s;
        }
        .container.ready {
            opacity: 1;
        }
        h1 {
            font-size: clamp(2rem, 6vw, 3.2rem);
            margin: 0 0 10px;
            letter-spacing: 3px;
            font-weight: 700;
            background: linear-gradient(90deg, #38bdf8, #818cf8);
            -webkit-background-clip: text;
            background-clip: text;
            -webkit-text-fill-color: transparent;
        }
        p {
            font-size: clamp(0.95rem, 2.2vw, 1.2rem);
            color: #94a3b8;
            margin: 0;
            letter-spacing: 0.3px;
        }
        .badge {
            display: inline-block;
            margin-bottom: 18px;
            padding: 6px 16px;
            font-size: 0.75rem;
            letter-spacing: 2px;
            text-transform: uppercase;
            color: #7dd3fc;
            border: 1px solid rgba(125, 211, 252, 0.35);
            border-radius: 999px;
            background: rgba(56, 189, 248, 0.06);
        }
        .fallback-note {
            position: fixed;
            top: 16px;
            right: 16px;
            font-size: 0.7rem;
            color: #475569;
            z-index: 2;
        }
        @media (prefers-reduced-motion: reduce) {
            #scene { display: none; }
            .container { position: static; transform: none; margin: 12vh auto; opacity: 1; }
        }
        body.no-webgl #scene { display: none; }
        body.no-webgl .container { position: static; transform: none; margin: 20vh auto; opacity: 1; }
    </style>
</head>
<body>
    <canvas id="scene"></canvas>

    <div class="container" id="copy">
        <span class="badge">Launching Soon</span>
        <h1>zcastify.com</h1>
        <p>Something exciting is coming soon. Stay tuned!</p>
    </div>

    <script type="importmap">
        { "imports": { "three": "https://unpkg.com/three@0.160.0/build/three.module.js" } }
    </script>
    <script type="module">
        import * as THREE from 'three';

        const canvas = document.getElementById('scene');
        const copy = document.getElementById('copy');

        function revealCopy() {
            copy.classList.add('ready');
        }

        let renderer;
        try {
            renderer = new THREE.WebGLRenderer({ canvas, antialias: true, alpha: true });
        } catch (e) {
            renderer = null;
        }

        if (!renderer || !window.WebGLRenderingContext) {
            document.body.classList.add('no-webgl');
            revealCopy();
        } else {
            initScene(renderer);
        }

        function initScene(renderer) {
            function viewportSize() {
                return {
                    w: window.innerWidth || document.documentElement.clientWidth || 1280,
                    h: window.innerHeight || document.documentElement.clientHeight || 720
                };
            }
            const initialSize = viewportSize();
            const isSmall = initialSize.w < 700;
            renderer.setPixelRatio(Math.min(window.devicePixelRatio || 1, 2));
            renderer.setSize(initialSize.w, initialSize.h);

            const scene = new THREE.Scene();
            const vFov = 45;
            const camera = new THREE.PerspectiveCamera(vFov, initialSize.w / initialSize.h, 0.1, 100);

            function computeCameraDistance() {
                const w = window.innerWidth || document.documentElement.clientWidth || 1280;
                const h = window.innerHeight || document.documentElement.clientHeight || 720;
                const aspect = w / h;
                const desiredHalfWidth = 3.4; // half-length of ship + margin
                const vFovRad = (vFov * Math.PI) / 180;
                const neededDist = desiredHalfWidth / (Math.tan(vFovRad / 2) * aspect);
                return Number.isFinite(neededDist) ? Math.max(8.5, neededDist) : 8.5;
            }

            const cameraBase = new THREE.Vector3(0, 1.4, computeCameraDistance());
            camera.position.copy(cameraBase);

            // ---------- Colors ----------
            const cCyan = new THREE.Color(0x38bdf8);
            const cIndigo = new THREE.Color(0x818cf8);

            function gradientLineColors(positionAttr, xMin, xMax) {
                const colors = new Float32Array(positionAttr.count * 3);
                const tmp = new THREE.Color();
                for (let i = 0; i < positionAttr.count; i++) {
                    const x = positionAttr.getX(i);
                    const t = THREE.MathUtils.clamp((x - xMin) / (xMax - xMin), 0, 1);
                    tmp.copy(cIndigo).lerp(cCyan, t);
                    colors[i * 3] = tmp.r;
                    colors[i * 3 + 1] = tmp.g;
                    colors[i * 3 + 2] = tmp.b;
                }
                return colors;
            }

            // ---------- Ship group ----------
            const ship = new THREE.Group();

            // Hull: hand-built as explicit contour + rib lines (avoids messy
            // triangulation seams you get from EdgesGeometry on a tapered extrude)
            const xMin = -2.65, xMax = 2.75;
            const hullDepth = 1.05;

            function hullTaper(x) {
                const nx = (x - (xMin + xMax) / 2) / ((xMax - xMin) / 2);
                return 0.22 + 0.78 * (1 - Math.pow(Math.abs(nx), 2.6));
            }

            const hullShape = new THREE.Shape();
            hullShape.moveTo(-2.4, 0.05);
            hullShape.quadraticCurveTo(-2.65, 0.5, -2.3, 0.78);
            hullShape.lineTo(1.8, 0.88);
            hullShape.quadraticCurveTo(2.6, 0.72, 2.75, 0.15);
            hullShape.quadraticCurveTo(2.6, -0.38, 1.5, -0.58);
            hullShape.quadraticCurveTo(-1.0, -0.72, -2.0, -0.5);
            hullShape.quadraticCurveTo(-2.5, -0.3, -2.4, 0.05);

            const profile2D = hullShape.getSpacedPoints(90);
            const leftPts = [], rightPts = [];
            for (const p of profile2D) {
                const z = (hullDepth / 2) * hullTaper(p.x);
                leftPts.push(new THREE.Vector3(p.x, p.y, -z));
                rightPts.push(new THREE.Vector3(p.x, p.y, z));
            }

            const lineMat = new THREE.LineBasicMaterial({ vertexColors: true, transparent: true, opacity: 0.95 });

            function loopLine(points) {
                const geo = new THREE.BufferGeometry().setFromPoints(points);
                geo.setAttribute('color', new THREE.BufferAttribute(gradientLineColors(geo.attributes.position, xMin, xMax), 3));
                return new THREE.LineLoop(geo, lineMat);
            }
            ship.add(loopLine(leftPts));
            ship.add(loopLine(rightPts));

            // Rib "frames" connecting the two sides at a handful of stations
            const ribStations = [
                { x: -2.2, yTop: 0.72, yBottom: -0.45 },
                { x: -1.4, yTop: 0.85, yBottom: -0.68 },
                { x: -0.4, yTop: 0.86, yBottom: -0.71 },
                { x: 0.6, yTop: 0.87, yBottom: -0.68 },
                { x: 1.5, yTop: 0.85, yBottom: -0.5 },
                { x: 2.3, yTop: 0.55, yBottom: -0.05 }
            ];
            const ribPts = [];
            for (const s of ribStations) {
                const z = (hullDepth / 2) * hullTaper(s.x);
                ribPts.push(new THREE.Vector3(s.x, s.yTop, -z), new THREE.Vector3(s.x, s.yTop, z));
                ribPts.push(new THREE.Vector3(s.x, s.yBottom, -z), new THREE.Vector3(s.x, s.yBottom, z));
                ribPts.push(new THREE.Vector3(s.x, s.yTop, -z), new THREE.Vector3(s.x, s.yBottom, -z));
                ribPts.push(new THREE.Vector3(s.x, s.yTop, z), new THREE.Vector3(s.x, s.yBottom, z));
            }
            const ribGeo = new THREE.BufferGeometry().setFromPoints(ribPts);
            ribGeo.setAttribute('color', new THREE.BufferAttribute(gradientLineColors(ribGeo.attributes.position, xMin, xMax), 3));
            ship.add(new THREE.LineSegments(ribGeo, new THREE.LineBasicMaterial({ vertexColors: true, transparent: true, opacity: 0.55 })));

            // Mast
            const mastGeo = new THREE.CylinderGeometry(0.028, 0.05, 2.4, 6);
            const mastEdges = new THREE.EdgesGeometry(mastGeo);
            const mastLines = new THREE.LineSegments(mastEdges, new THREE.LineBasicMaterial({ color: 0x9db4d8, transparent: true, opacity: 0.85 }));
            mastLines.position.set(-0.35, 0.88 + 1.2, 0);
            ship.add(mastLines);

            // Mainsail: tapered + billowed plane so it reads as a triangular sail
            function buildSail(width, height, curve, color, topWidthRatio = 0.08) {
                const seg = 10;
                const geo = new THREE.PlaneGeometry(width, height, seg, 6);
                const pos = geo.attributes.position;
                for (let i = 0; i < pos.count; i++) {
                    const px = pos.getX(i);
                    const py = pos.getY(i);
                    const v = (py + height / 2) / height; // 0 bottom -> 1 top
                    const widthScale = 1 - (1 - topWidthRatio) * v;
                    const newX = px * widthScale;
                    const t = newX / (width / 2);
                    pos.setX(i, newX);
                    pos.setZ(i, curve * (1 - t * t));
                }
                pos.needsUpdate = true;
                geo.computeVertexNormals();
                const edges = new THREE.EdgesGeometry(geo, 25);
                return new THREE.LineSegments(edges, new THREE.LineBasicMaterial({ color, transparent: true, opacity: 0.8 }));
            }

            const mainSail = buildSail(1.7, 1.9, 0.35, 0x7dd3fc);
            mainSail.rotation.y = Math.PI / 2;
            mainSail.position.set(-0.35, 0.88 + 1.15, 0.05);
            ship.add(mainSail);

            const jibSail = buildSail(1.15, 1.35, 0.22, 0x93c5fd);
            jibSail.rotation.y = Math.PI / 2 + 0.18;
            jibSail.position.set(0.85, 0.88 + 0.75, 0.02);
            ship.add(jibSail);

            // Flag
            const flagGeo = new THREE.BufferGeometry();
            flagGeo.setAttribute('position', new THREE.Float32BufferAttribute([
                0, 0, 0,  0.3, 0.12, 0,  0, 0.24, 0
            ], 3));
            flagGeo.setIndex([0, 1, 2]);
            const flagEdges = new THREE.EdgesGeometry(flagGeo, 1);
            const flag = new THREE.LineSegments(flagEdges, new THREE.LineBasicMaterial({ color: 0xf0abfc, transparent: true, opacity: 0.9 }));
            flag.position.set(-0.35, 0.88 + 2.36, 0);
            ship.add(flag);

            ship.scale.setScalar(0.001);
            ship.position.y = 0.2;
            scene.add(ship);

            // ---------- Sea grid (line-art waves) ----------
            const seaSize = isSmall ? 20 : 30;
            const seaDivX = isSmall ? 26 : 40;
            const seaDivZ = isSmall ? 10 : 16;
            const seaPositions = [];
            const stepX = seaSize / seaDivX;
            const stepZ = (seaSize * 0.6) / seaDivZ;
            const halfX = seaSize / 2;
            const halfZ = (seaSize * 0.6) / 2;

            const gridPoints = [];
            for (let i = 0; i <= seaDivX; i++) {
                gridPoints.push([]);
                for (let j = 0; j <= seaDivZ; j++) {
                    gridPoints[i].push(new THREE.Vector3(-halfX + i * stepX, 0, -halfZ + j * stepZ));
                }
            }
            for (let i = 0; i <= seaDivX; i++) {
                for (let j = 0; j < seaDivZ; j++) {
                    seaPositions.push(gridPoints[i][j].x, gridPoints[i][j].y, gridPoints[i][j].z);
                    seaPositions.push(gridPoints[i][j + 1].x, gridPoints[i][j + 1].y, gridPoints[i][j + 1].z);
                }
            }
            for (let j = 0; j <= seaDivZ; j++) {
                for (let i = 0; i < seaDivX; i++) {
                    seaPositions.push(gridPoints[i][j].x, gridPoints[i][j].y, gridPoints[i][j].z);
                    seaPositions.push(gridPoints[i + 1][j].x, gridPoints[i + 1][j].y, gridPoints[i + 1][j].z);
                }
            }

            const seaGeo = new THREE.BufferGeometry();
            const seaArray = new Float32Array(seaPositions);
            seaGeo.setAttribute('position', new THREE.BufferAttribute(seaArray, 3));
            const seaMat = new THREE.LineBasicMaterial({ color: 0x2c3a63, transparent: true, opacity: 0.55 });
            const sea = new THREE.LineSegments(seaGeo, seaMat);
            sea.position.y = -1.6;
            scene.add(sea);

            // ---------- Starfield ----------
            const starCount = isSmall ? 220 : 420;
            const starGeo = new THREE.BufferGeometry();
            const starPos = new Float32Array(starCount * 3);
            for (let i = 0; i < starCount; i++) {
                const r = 18 + Math.random() * 20;
                const theta = Math.random() * Math.PI * 2;
                const phi = Math.acos((Math.random() * 2) - 1);
                starPos[i * 3] = r * Math.sin(phi) * Math.cos(theta);
                starPos[i * 3 + 1] = Math.abs(r * Math.sin(phi) * Math.sin(theta)) * 0.5 + 1;
                starPos[i * 3 + 2] = r * Math.cos(phi) - 8;
            }
            starGeo.setAttribute('position', new THREE.BufferAttribute(starPos, 3));
            const starMat = new THREE.PointsMaterial({ color: 0x9fc6ff, size: 0.045, transparent: true, opacity: 0.7, sizeAttenuation: true });
            const stars = new THREE.Points(starGeo, starMat);
            scene.add(stars);

            // ---------- Mouse parallax ----------
            const mouse = { x: 0, y: 0 };
            window.addEventListener('mousemove', (e) => {
                mouse.x = (e.clientX / window.innerWidth) * 2 - 1;
                mouse.y = (e.clientY / window.innerHeight) * 2 - 1;
            });
            window.addEventListener('touchmove', (e) => {
                if (!e.touches.length) return;
                mouse.x = (e.touches[0].clientX / window.innerWidth) * 2 - 1;
                mouse.y = (e.touches[0].clientY / window.innerHeight) * 2 - 1;
            }, { passive: true });

            // ---------- Resize ----------
            window.addEventListener('resize', () => {
                const size = viewportSize();
                camera.aspect = size.w / size.h;
                camera.updateProjectionMatrix();
                renderer.setSize(size.w, size.h);
                cameraBase.z = computeCameraDistance();
            });

            // ---------- Intro animation ----------
            function easeOutBack(t) {
                const c1 = 1.70158, c3 = c1 + 1;
                return 1 + c3 * Math.pow(t - 1, 3) + c1 * Math.pow(t - 1, 2);
            }

            const clock = new THREE.Clock();
            const introDuration = 1.8;
            let introDone = false;

            canvas.classList.add('ready');
            requestAnimationFrame(() => revealCopy());

            function animate() {
                requestAnimationFrame(animate);
                const t = clock.getElapsedTime();

                if (!introDone) {
                    const p = Math.min(t / introDuration, 1);
                    const eased = easeOutBack(p);
                    ship.scale.setScalar(Math.max(0.001, eased));
                    ship.rotation.y = (1 - p) * 1.4;
                    if (p >= 1) introDone = true;
                } else {
                    ship.position.y = 0.2 + Math.sin(t * 0.9) * 0.12;
                    ship.rotation.z = Math.sin(t * 0.7) * 0.045;
                    ship.rotation.y += 0.0022;
                }

                const seaPosAttr = seaGeo.attributes.position;
                for (let i = 0; i < seaPosAttr.count; i++) {
                    const x = seaPosAttr.getX(i);
                    const z = seaPosAttr.getZ(i);
                    seaPosAttr.setY(i, Math.sin(x * 0.5 + t * 0.8) * 0.18 + Math.cos(z * 0.6 + t * 0.6) * 0.12);
                }
                seaPosAttr.needsUpdate = true;

                stars.rotation.y = t * 0.01;

                camera.position.x += (cameraBase.x + mouse.x * 1.1 - camera.position.x) * 0.04;
                camera.position.y += (cameraBase.y - mouse.y * 0.5 - camera.position.y) * 0.04;
                camera.lookAt(0, 0.5, 0);

                renderer.render(scene, camera);
            }
            animate();
        }
    </script>
</body>
</html>
